<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexiCard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F8FAFC; --surface:#FFFFFF; --primary:#6366F1; --primary-hover:#4F46E5;
    --secondary:#8B5CF6; --success:#22C55E; --warning:#F59E0B; --error:#EF4444;
    --text-primary:#0F172A; --text-secondary:#64748B; --border:#E2E8F0;
    --radius-card:32px; --radius-button:999px; --radius-input:16px;
    --shadow-card:0 20px 50px rgba(15,23,42,0.08);
    --shadow-hover:0 25px 60px rgba(15,23,42,0.12);
    --sp-xs:4px; --sp-sm:8px; --sp-md:16px; --sp-lg:24px; --sp-xl:40px; --sp-xxl:64px;
  }
  [data-theme="dark"]{
    --bg:#020617; --surface:#0F172A; --primary:#818CF8; --primary-hover:#A5B4FC;
    --secondary:#A78BFA; --text-primary:#F8FAFC; --text-secondary:#94A3B8; --border:#1E293B;
    --shadow-card:0 20px 50px rgba(0,0,0,0.35);
    --shadow-hover:0 25px 60px rgba(0,0,0,0.45);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; overflow:hidden;}
  body{
    font-family:'Inter','Noto Sans Thai',sans-serif;
    background:var(--bg); color:var(--text-primary);
    transition:background .3s ease, color .3s ease;
    -webkit-font-smoothing:antialiased;
  }
  button, input{font-family:inherit;}
  .app{display:flex; height:100vh; overflow:hidden;}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:240px; flex-shrink:0; padding:var(--sp-lg); display:flex; flex-direction:column;
    gap:var(--sp-lg); border-right:1px solid var(--border); height:100%; overflow-y:auto;
  }
  .brand{display:flex; align-items:center; gap:var(--sp-sm); font-weight:800; font-size:22px;}
  .brand-mark{
    width:36px; height:36px; border-radius:12px;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  .nav{display:flex; flex-direction:column; gap:var(--sp-xs);}
  .nav-item{
    display:flex; align-items:center; gap:var(--sp-sm); padding:12px 16px; border-radius:16px;
    color:var(--text-secondary); cursor:pointer; font-weight:600; font-size:14px; border:none;
    background:transparent; text-align:left; transition:background .2s ease, color .2s ease;
  }
  .nav-item:hover{background:var(--border); color:var(--text-primary);}
  .nav-item.active{background:var(--primary); color:#fff;}
  .sidebar-footer{margin-top:auto; display:flex; flex-direction:column; gap:var(--sp-sm);}
  .theme-toggle{
    display:flex; align-items:center; justify-content:space-between; padding:12px 16px;
    border-radius:16px; background:var(--bg); border:1px solid var(--border); cursor:pointer;
    font-size:13px; font-weight:600; color:var(--text-secondary);
  }
  .keyboard-hint{
    font-size:11px; color:var(--text-secondary); text-align:center; padding:8px;
    line-height:1.6;
  }
  kbd{
    background:var(--border); border-radius:4px; padding:2px 5px;
    font-family:monospace; font-size:11px;
  }

  /* ---------- Main ---------- */
  .main{flex:1; padding:var(--sp-md) var(--sp-xl); display:flex; flex-direction:column; overflow:hidden; min-width:0;}
  .view{display:none; animation:fadeUp .3s ease;}
  .view.active{display:flex; flex-direction:column; flex:1; min-height:0;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- Session header ---------- */
  .session-header{
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:var(--sp-md);
    margin-bottom:var(--sp-sm); flex-shrink:0;
  }
  .session-title{display:flex; flex-direction:column; gap:4px;}
  .session-title h2{font-size:26px; font-weight:800;}
  .session-title span{color:var(--text-secondary); font-size:14px; font-weight:600;}
  .session-stats{display:flex; align-items:center; gap:var(--sp-lg);}
  .bloom-ring-wrap{position:relative; width:64px; height:64px;}
  .bloom-ring-wrap svg{transform:rotate(-90deg);}
  .bloom-center{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:18px; transition:transform .4s ease;
  }
  .stat-chip{
    display:flex; flex-direction:column; align-items:center; padding:8px 16px; border-radius:16px;
    background:var(--surface); border:1px solid var(--border); min-width:64px;
  }
  .stat-chip b{font-size:16px;}
  .stat-chip span{font-size:11px; color:var(--text-secondary); font-weight:700; text-transform:uppercase; letter-spacing:.03em;}

  .mode-tabs{display:flex; gap:var(--sp-xs); background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-button); padding:4px; width:fit-content; margin-bottom:var(--sp-sm); flex-shrink:0;}
  .mode-tab{padding:8px 20px; border-radius:var(--radius-button); border:none; background:transparent; color:var(--text-secondary); font-weight:700; font-size:14px; cursor:pointer; transition:all .2s ease;}
  .mode-tab.active{background:var(--primary); color:#fff;}

  .mode-panel{display:none;}
  .mode-panel.active{display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden;}

  /* ---------- Flashcard (swipeable stack) ---------- */
  :root{
    --card-bg-default:linear-gradient(135deg,#FFFFFF,#F8FAFC);
    --card-bg-forgot:linear-gradient(135deg,#FEE2E2,#FCA5A5);
    --card-bg-remembered:linear-gradient(135deg,#DCFCE7,#86EFAC);
    --card-bg-favorite:linear-gradient(135deg,#FEF9C3,#FCD34D);
    --card-bg-skip:linear-gradient(135deg,#F1F5F9,#CBD5E1);
  }
  [data-theme="dark"]{
    --card-bg-default:linear-gradient(135deg,#1E293B,#0F172A);
    --card-bg-forgot:linear-gradient(135deg,#7F1D1D,#450A0A);
    --card-bg-remembered:linear-gradient(135deg,#14532D,#052E13);
    --card-bg-favorite:linear-gradient(135deg,#78350F,#451A03);
    --card-bg-skip:linear-gradient(135deg,#334155,#1E293B);
  }
  .flashcard-stage{display:flex; flex-direction:column; align-items:center; gap:var(--sp-sm); flex:1; min-height:0; justify-content:space-between;}
  .swipe-hint-row{text-align:center; font-size:12px; color:var(--text-secondary); font-weight:600; flex-shrink:0;}

  .card-stack{position:relative; width:100%; max-width:420px; flex:1; min-height:0; margin:0 auto;}
  .stack-card{
    position:absolute; inset:0; border-radius:32px; cursor:pointer;
    touch-action:pan-y; user-select:none; -webkit-user-select:none;
    transition:transform .32s cubic-bezier(.34,1.15,.64,1), opacity .32s ease;
    perspective:1400px;
  }
  .stack-card:not(.is-top){cursor:default;}
  .flip-card-inner{
    position:relative; width:100%; height:100%; text-align:center;
    transition:transform .6s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d;
  }
  .stack-card.flipped .flip-card-inner{transform:rotateY(180deg);}
  .card-face{
    position:absolute; inset:0; border-radius:32px; backface-visibility:hidden;
    background:var(--card-bg-default); box-shadow:0 20px 60px rgba(15,23,42,.12); border:1px solid var(--border);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:var(--sp-xl); gap:var(--sp-sm); overflow:hidden;
  }
  .card-face.back{transform:rotateY(180deg); justify-content:flex-start; padding-top:var(--sp-xl); gap:var(--sp-md);}
  .card-tint{
    position:absolute; inset:0; border-radius:32px; z-index:4; pointer-events:none;
    background:transparent;
  }
  .card-tag{
    font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.08em;
    color:var(--secondary); background:rgba(139,92,246,0.12); padding:6px 14px; border-radius:var(--radius-button);
  }
  .card-word{font-size:38px; font-weight:800; letter-spacing:-.02em;}
  .card-phonetic{color:var(--text-secondary); font-size:15px; font-style:italic;}
  .card-translation{font-size:22px; font-weight:700; color:var(--primary); margin-top:var(--sp-sm);}
  .card-hint{position:absolute; bottom:20px; font-size:12px; color:var(--text-secondary); font-weight:600;}
  .card-face.back .section-label{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--text-secondary); align-self:flex-start;}
  .card-face.back .section-text{align-self:flex-start; font-size:15px; line-height:1.6;}
  .synonym-row{display:flex; gap:8px; flex-wrap:wrap; align-self:flex-start;}
  .synonym-chip{background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-button); padding:6px 12px; font-size:13px; font-weight:600;}
  .favorite-mark{position:absolute; top:16px; right:16px; font-size:18px; z-index:5; opacity:0;}
  .stack-card.is-favorite .favorite-mark{opacity:1;}

  .swipe-badge{
    position:absolute; z-index:6; padding:8px 16px; border-radius:12px;
    font-weight:800; font-size:14px; border:3px solid; opacity:0; pointer-events:none;
    letter-spacing:.02em; background:var(--surface);
  }
  .badge-forgot{top:24px; left:24px; color:#EF4444; border-color:#EF4444; transform:rotate(-8deg);}
  .badge-remembered{top:24px; right:24px; color:#22C55E; border-color:#22C55E; transform:rotate(8deg);}
  .badge-favorite{top:24px; left:50%; margin-left:-58px; color:#FBBF24; border-color:#FBBF24;}
  .badge-skip{bottom:24px; left:50%; margin-left:-38px; color:#64748B; border-color:#94A3B8;}

  .audio-controls{display:flex; gap:var(--sp-sm); flex-shrink:0;}
  .icon-btn{
    width:44px; height:44px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface);
    color:var(--primary); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .2s ease;
  }
  .icon-btn:hover{background:var(--primary); color:#fff; border-color:var(--primary); transform:translateY(-2px);}

  .card-nav{display:flex; align-items:center; justify-content:center; width:100%; max-width:420px; flex-shrink:0;}
  .rate-row{display:flex; gap:var(--sp-sm); width:100%; max-width:420px; flex-shrink:0;}
  .rate-btn{flex:1; padding:10px 4px; border-radius:var(--radius-input); border:1.5px solid var(--border); background:var(--surface); font-weight:700; font-size:12px; cursor:pointer; transition:all .2s ease; color:var(--text-primary);}
  .rate-btn.remembered:hover{background:#22C55E; border-color:#22C55E; color:#fff;}
  .rate-btn.favorite:hover{background:#FBBF24; border-color:#FBBF24; color:#fff;}
  .rate-btn.skip:hover{background:#94A3B8; border-color:#94A3B8; color:#fff;}
  .rate-btn.forgot:hover{background:#EF4444; border-color:#EF4444; color:#fff;}

  .btn{
    border:none; border-radius:var(--radius-button); font-weight:700; font-size:15px; cursor:pointer;
    padding:16px 24px; transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-outline{background:transparent; border:1.5px solid var(--border); color:var(--text-primary);}
  .btn-outline:hover{border-color:var(--primary); color:var(--primary); transform:translateY(-2px);}
  .btn-primary{background:var(--primary); color:#fff;}
  .btn-primary:hover{background:var(--primary-hover); transform:translateY(-2px); box-shadow:var(--shadow-hover);}

  /* ---------- Quiz ---------- */
  .quiz-stage{max-width:520px; margin:0 auto; display:flex; flex-direction:column; gap:var(--sp-md); flex:1; min-height:0; overflow-y:auto; padding-right:4px; width:100%;}
  .quiz-progress-track{height:8px; border-radius:var(--radius-button); background:var(--border); overflow:hidden;}
  .quiz-progress-fill{height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); border-radius:var(--radius-button); transition:width .3s ease;}
  .question-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card);
    padding:var(--sp-xl); box-shadow:var(--shadow-card); text-align:center;
  }
  .question-eyebrow{font-size:12px; font-weight:800; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.06em; margin-bottom:var(--sp-sm);}
  .question-word{font-size:32px; font-weight:800; margin-bottom:6px;}
  .question-phonetic{color:var(--text-secondary); font-style:italic; font-size:14px;}
  .options-grid{display:flex; flex-direction:column; gap:var(--sp-sm);}
  .option-btn{
    padding:16px 20px; border-radius:var(--radius-input); border:1.5px solid var(--border); background:var(--surface);
    text-align:left; font-size:15px; font-weight:600; cursor:pointer; transition:all .15s ease; color:var(--text-primary);
  }
  .option-btn:hover:not([disabled]){border-color:var(--primary); transform:translateX(4px);}
  .option-btn.correct{background:rgba(34,197,94,0.12); border-color:var(--success); color:var(--success);}
  .option-btn.incorrect{background:rgba(239,68,68,0.12); border-color:var(--error); color:var(--error);}
  .option-btn[disabled]{cursor:default;}

  .summary-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card); padding:var(--sp-xl); box-shadow:var(--shadow-card); text-align:center;}
  .score-big{font-size:56px; font-weight:800; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .mistake-list{text-align:left; margin-top:var(--sp-lg); display:flex; flex-direction:column; gap:var(--sp-sm);}
  .mistake-item{padding:14px 16px; border-radius:var(--radius-input); background:var(--bg); border:1px solid var(--border); font-size:14px;}
  .mistake-item b{color:var(--error);}

  /* ---------- Bottom nav (mobile) ---------- */
  .bottom-nav{display:none;}

  @media (max-width:860px){
    .sidebar{display:none;}
    .main{padding:var(--sp-sm) var(--sp-md) calc(var(--sp-sm) + 64px);}
    .bottom-nav{
      display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--surface);
      border-top:1px solid var(--border); padding:6px 12px calc(6px + env(safe-area-inset-bottom));
      justify-content:space-around; z-index:20;
    }
    .bottom-nav button{
      display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none;
      color:var(--text-secondary); font-size:11px; font-weight:700; padding:8px 14px; border-radius:16px;
      min-width:48px; min-height:44px; cursor:pointer;
    }
    .bottom-nav button.active{color:var(--primary);}
    .card-word{font-size:30px;}
  }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">🌱</div>LexiCard</div>
    <nav class="nav">
      <button class="nav-item active" data-nav="flashcard">🗂️&nbsp; Flashcards</button>
      <button class="nav-item" data-nav="quiz">🎯&nbsp; ทดสอบ</button>
    </nav>
    <div class="sidebar-footer">
      <div class="keyboard-hint">
        <kbd>←</kbd> จำไม่ได้ &nbsp; <kbd>→</kbd> จำได้<br>
        <kbd>↑</kbd> Favorite &nbsp; <kbd>↓</kbd> Skip<br>
        <kbd>Space</kbd> พลิกการ์ด
      </div>
      <button class="theme-toggle" id="themeToggle">
        <span id="themeLabel">โหมดมืด</span><span id="themeIcon">🌙</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <section class="view active" id="view-session">
      <div class="session-header">
        <div class="session-title">
          <h2 id="sessionCategory">หมวดหมู่</h2>
          <span id="sessionMeta">ภาษา · ระดับ · 20 คำ</span>
        </div>
        <div class="session-stats">
          <div class="stat-chip"><b id="statMastered">0</b><span>จำได้แล้ว</span></div>
          <div class="stat-chip"><b id="statXP">0</b><span>XP</span></div>
          <div class="bloom-ring-wrap">
            <svg width="64" height="64" viewBox="0 0 64 64">
              <circle cx="32" cy="32" r="27" fill="none" stroke="var(--border)" stroke-width="6"/>
              <circle id="bloomRing" cx="32" cy="32" r="27" fill="none" stroke="url(#bloomGradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="169.6" stroke-dashoffset="169.6"/>
              <defs>
                <linearGradient id="bloomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="var(--primary)"/>
                  <stop offset="100%" stop-color="var(--secondary)"/>
                </linearGradient>
              </defs>
            </svg>
            <div class="bloom-center" id="bloomCenter">🌱</div>
          </div>
        </div>
      </div>

      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="flashcard">🗂️ Flashcards</button>
        <button class="mode-tab" data-mode="quiz">🎯 ทดสอบ</button>
      </div>

      <!-- Flashcard mode -->
      <div class="mode-panel active" id="panel-flashcard">
        <div class="flashcard-stage">
          <div class="swipe-hint-row">❌ ปัดซ้าย จำไม่ได้ &nbsp;·&nbsp; ✅ ปัดขวา จำได้ &nbsp;·&nbsp; ⭐ ปัดขึ้น Favorite &nbsp;·&nbsp; ⏭ ปัดลง Skip</div>

          <div class="card-stack" id="cardStack"></div>

          <div class="summary-card" id="sessionCompleteCard" style="display:none;">
            <div class="question-eyebrow">จบเซสชันแล้ว 🎉</div>
            <div class="score-big" id="completeEmoji">🌸</div>
            <p style="color:var(--text-secondary); font-weight:600; margin-top:8px;">จำได้ครบทุกคำในรอบนี้แล้ว</p>
            <button class="btn btn-primary" style="margin-top:24px;" id="restartFlashcardBtn">เริ่มรอบใหม่</button>
          </div>

          <div class="audio-controls" id="audioControls">
            <button class="icon-btn" id="speakWordBtn" title="ออกเสียงคำศัพท์">🔊</button>
            <button class="icon-btn" id="speakSentenceBtn" title="อ่านตัวอย่างประโยค">📖</button>
          </div>

          <div class="rate-row" id="rateRow">
            <button class="rate-btn forgot" data-action="forgot">❌ จำไม่ได้</button>
            <button class="rate-btn skip" data-action="skip">⏭ Skip</button>
            <button class="rate-btn favorite" data-action="favorite">⭐ Favorite</button>
            <button class="rate-btn remembered" data-action="remembered">✅ จำได้</button>
          </div>

          <div class="card-nav" id="cardNav">
            <span id="cardProgress" style="font-weight:700; color:var(--text-secondary); font-size:14px;">เหลือ 20 คำ · จำได้แล้ว 0/20</span>
          </div>
        </div>
      </div>

      <!-- Quiz mode -->
      <div class="mode-panel" id="panel-quiz">
        <div class="quiz-stage" id="quizStage"></div>
      </div>
    </section>
  </main>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav">
    <button class="active" data-nav="flashcard">🗂️<span>Flashcards</span></button>
    <button data-nav="quiz">🎯<span>ทดสอบ</span></button>
  </nav>

</div>

<script>
(function(){
  // Vocabulary data injected by the flashcard skill.
  // Replace VOCAB_DATA_PLACEHOLDER with the generated JSON object.
  const VOCAB_DATA = VOCAB_DATA_PLACEHOLDER;

  // ---------------- State ----------------
  const state = {
    category: VOCAB_DATA.category,
    language: VOCAB_DATA.language,
    difficulty: VOCAB_DATA.difficulty,
    lang_code: VOCAB_DATA.lang_code || 'en-US',
    words: VOCAB_DATA.words,
    queue: VOCAB_DATA.words.map((_, i) => i),
    mastered: new Set(),
    favorites: new Set(),
    xp: 0,
    quiz: null
  };

  // ---------------- Theme ----------------
  const themeToggle = document.getElementById('themeToggle');
  const themeLabel  = document.getElementById('themeLabel');
  const themeIcon   = document.getElementById('themeIcon');
  themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if(isDark){
      document.documentElement.removeAttribute('data-theme');
      themeLabel.textContent = 'โหมดมืด'; themeIcon.textContent = '🌙';
    } else {
      document.documentElement.setAttribute('data-theme','dark');
      themeLabel.textContent = 'โหมดสว่าง'; themeIcon.textContent = '☀️';
    }
  });

  // ---------------- Mode tabs / nav ----------------
  function switchMode(mode){
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
    document.getElementById('panel-flashcard').classList.toggle('active', mode === 'flashcard');
    document.getElementById('panel-quiz').classList.toggle('active', mode === 'quiz');
    document.querySelectorAll('[data-nav]').forEach(b => b.classList.toggle('active', b.dataset.nav === mode));
    if(mode === 'quiz' && !state.quiz) startQuiz();
  }
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => switchMode(tab.dataset.mode));
  });
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => switchMode(btn.dataset.nav));
  });

  // ---------------- Session header / bloom ring ----------------
  const bloomRing   = document.getElementById('bloomRing');
  const bloomCenter = document.getElementById('bloomCenter');
  const CIRCUMFERENCE = 169.6;
  const DIFFICULTY_LABEL = { beginner:'ง่าย', intermediate:'กลาง', advanced:'ยาก' };

  function renderSessionHeader(){
    document.title = 'LexiCard — ' + state.category;
    document.getElementById('sessionCategory').textContent = state.category;
    const diffLabel = DIFFICULTY_LABEL[state.difficulty] || state.difficulty;
    document.getElementById('sessionMeta').textContent = 'ภาษา' + state.language + ' · ระดับ' + diffLabel + ' · ' + state.words.length + ' คำ';
    updateStats();
  }
  function updateStats(){
    document.getElementById('statMastered').textContent = state.mastered.size;
    document.getElementById('statXP').textContent = state.xp;
    const pct = state.words.length ? state.mastered.size / state.words.length : 0;
    bloomRing.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
    const scale = 0.7 + pct * 0.6;
    bloomCenter.style.transform = 'scale(' + scale.toFixed(2) + ')';
    bloomCenter.textContent = pct >= 1 ? '🌸' : pct >= 0.5 ? '🌿' : '🌱';
  }

  // ---------------- Flashcard mode (swipeable stack) ----------------
  // swipe left  = forgot     (re-queued, ask again)      swipe right = remembered (leaves queue for good)
  // swipe up    = favorite   (bookmarked, re-queued)      swipe down  = skip       (re-queued, neutral)
  const cardStack        = document.getElementById('cardStack');
  const sessionComplete  = document.getElementById('sessionCompleteCard');
  const audioControls    = document.getElementById('audioControls');
  const rateRow          = document.getElementById('rateRow');
  const cardNav          = document.getElementById('cardNav');
  const cardProgress     = document.getElementById('cardProgress');

  const SWIPE_THRESHOLD_X = 90;
  const SWIPE_THRESHOLD_Y = 80;
  const SLOT_TRANSFORM = ['translateY(0px) scale(1)', 'translateY(10px) scale(0.96)', 'translateY(20px) scale(0.92)'];
  const ACTION_META = {
    forgot:     { overlay: 'rgba(239,68,68,',   badgeClass: '.badge-forgot' },
    remembered: { overlay: 'rgba(34,197,94,',   badgeClass: '.badge-remembered' },
    favorite:   { overlay: 'rgba(251,191,36,',  badgeClass: '.badge-favorite' },
    skip:       { overlay: 'rgba(148,163,184,', badgeClass: '.badge-skip' }
  };

  function buildStackCardHTML(){
    return '<div class="card-tint"></div>' +
      '<div class="favorite-mark">⭐</div>' +
      '<div class="swipe-badge badge-forgot">❌ จำไม่ได้</div>' +
      '<div class="swipe-badge badge-remembered">✅ จำได้</div>' +
      '<div class="swipe-badge badge-favorite">⭐ FAVORITE</div>' +
      '<div class="swipe-badge badge-skip">SKIP</div>' +
      '<div class="flip-card-inner">' +
        '<div class="card-face front">' +
          '<div class="card-tag js-pos">noun</div>' +
          '<div class="card-word js-word">word</div>' +
          '<div class="card-phonetic js-phonetic">/wɜːd/</div>' +
          '<div class="card-translation js-translation">คำแปล</div>' +
          '<div class="card-hint">แตะการ์ดหรือกด Space เพื่อดูรายละเอียด</div>' +
        '</div>' +
        '<div class="card-face back">' +
          '<div class="section-label">ตัวอย่างประโยค</div>' +
          '<div class="section-text js-example">Example sentence.</div>' +
          '<div class="section-label">คำใกล้เคียง</div>' +
          '<div class="synonym-row js-synonyms"></div>' +
        '</div>' +
      '</div>';
  }

  const stackEls = [0, 1, 2].map(() => {
    const el = document.createElement('div');
    el.className = 'stack-card';
    el.innerHTML = buildStackCardHTML();
    cardStack.appendChild(el);
    return el;
  });
  let order = [0, 1, 2]; // order[slot] -> index into stackEls currently occupying that slot
  let isAnimating = false;
  let dragState = null;

  function elAt(slot){ return stackEls[order[slot]]; }
  function currentWord(){ return state.queue.length ? state.words[state.queue[0]] : null; }

  function clearBadges(el){ el.querySelectorAll('.swipe-badge').forEach(b => b.style.opacity = 0); }
  function clearTint(el){ el.querySelector('.card-tint').style.background = 'transparent'; }

  function populateCardContent(el, word){
    if(!word) return;
    el.querySelector('.js-pos').textContent = word.pos || '—';
    el.querySelector('.js-word').textContent = word.word;
    el.querySelector('.js-phonetic').textContent = word.phonetic ? '/' + word.phonetic.replace(/\//g,'') + '/' : '';
    el.querySelector('.js-translation').textContent = word.translation;
    el.querySelector('.js-example').textContent = word.example || '—';
    const synWrap = el.querySelector('.js-synonyms');
    synWrap.innerHTML = '';
    (word.synonyms || []).forEach(s => {
      const chip = document.createElement('span');
      chip.className = 'synonym-chip'; chip.textContent = s;
      synWrap.appendChild(chip);
    });
    el.classList.toggle('is-favorite', state.favorites.has(word.word));
  }

  function layoutStack(instant){
    [0, 1, 2].forEach(slot => {
      const el = elAt(slot);
      const hasWord = state.queue[slot] !== undefined;
      el.style.transition = instant ? 'none' : '';
      el.style.zIndex = 3 - slot;
      el.style.transform = SLOT_TRANSFORM[slot];
      el.style.opacity = hasWord ? '1' : '0';
      el.classList.toggle('is-top', slot === 0);
      el.classList.remove('flipped');
      clearBadges(el);
      clearTint(el);
      if(instant){
        void el.offsetWidth;
        el.style.transition = '';
      }
    });
  }

  function showStack(show){
    cardStack.style.display    = show ? '' : 'none';
    audioControls.style.display = show ? '' : 'none';
    rateRow.style.display       = show ? '' : 'none';
    cardNav.style.display       = show ? '' : 'none';
    sessionComplete.style.display = show ? 'none' : 'block';
  }

  function renderFlashcard(){
    if(!state.queue.length){ showStack(false); return; }
    showStack(true);
    for(let slot = 0; slot < 3; slot++){
      const idx  = state.queue[slot];
      const word = idx !== undefined ? state.words[idx] : null;
      if(word) populateCardContent(elAt(slot), word);
    }
    layoutStack(true);
    cardProgress.textContent = 'เหลือ ' + state.queue.length + ' คำ · จำได้แล้ว ' + state.mastered.size + '/' + state.words.length;
  }

  function applyQueueMutation(action, idx, word){
    state.queue.shift();
    if(action === 'remembered'){
      state.mastered.add(word.word);
      state.xp += 10;
    } else if(action === 'forgot'){
      state.mastered.delete(word.word);
      state.xp += 2;
      state.queue.push(idx); // re-queue to ask again
    } else if(action === 'favorite'){
      state.favorites.add(word.word);
      state.xp += 3;
      state.queue.push(idx);
    } else if(action === 'skip'){
      state.queue.push(idx);
    }
  }

  function flyTop(el, action){
    let tx = 0, ty = 0, rot = 0;
    if(action === 'remembered')     { tx = 700;  rot = 20; }
    else if(action === 'forgot')    { tx = -700; rot = -20; }
    else if(action === 'favorite')  { ty = -700; }
    else if(action === 'skip')      { ty = 700; }
    const meta = ACTION_META[action];
    el.querySelector(meta.badgeClass).style.opacity = 1;
    el.querySelector('.card-tint').style.background = meta.overlay + '0.35)';
    el.style.transition = 'transform .32s ease, opacity .32s ease';
    el.style.transform = 'translate(' + tx + 'px, ' + ty + 'px) rotate(' + rot + 'deg)';
    el.style.opacity = '0';
  }

  function promoteBackCards(){
    const el1 = elAt(1), el2 = elAt(2);
    el1.style.transition = '';
    el1.style.transform = SLOT_TRANSFORM[0];
    el1.style.zIndex = 3;
    el2.style.transition = '';
    el2.style.transform = SLOT_TRANSFORM[1];
    el2.style.zIndex = 2;
  }

  function commitAction(action){
    if(isAnimating || !state.queue.length) return;
    isAnimating = true;
    const topEl = elAt(0);
    const idx   = state.queue[0];
    const word  = state.words[idx];

    if(navigator.vibrate) navigator.vibrate(25);
    flyTop(topEl, action);
    promoteBackCards();

    setTimeout(() => {
      applyQueueMutation(action, idx, word);
      updateStats();
      order = [order[1], order[2], order[0]]; // recycle the flown-out card to the back of the stack
      renderFlashcard();
      isAnimating = false;
    }, 320);
  }

  document.querySelectorAll('.rate-btn').forEach(btn => {
    btn.addEventListener('click', () => commitAction(btn.dataset.action));
  });

  document.getElementById('restartFlashcardBtn').addEventListener('click', () => {
    state.queue = state.words.map((_, i) => i);
    state.mastered.clear();
    updateStats();
    renderFlashcard();
  });

  // ---- Drag / swipe (pointer events cover touch + mouse + pen) ----
  function resolveSwipeAction(dx, dy){
    if(Math.abs(dx) > Math.abs(dy)){
      if(dx > SWIPE_THRESHOLD_X)  return 'remembered';
      if(dx < -SWIPE_THRESHOLD_X) return 'forgot';
    } else {
      if(dy < -SWIPE_THRESHOLD_Y) return 'favorite';
      if(dy > SWIPE_THRESHOLD_Y)  return 'skip';
    }
    return null;
  }

  function updateLiveFeedback(el, dx, dy){
    let dir, progress;
    if(Math.abs(dx) > Math.abs(dy)){
      dir = dx > 0 ? 'remembered' : 'forgot';
      progress = Math.min(Math.abs(dx) / SWIPE_THRESHOLD_X, 1);
    } else {
      dir = dy < 0 ? 'favorite' : 'skip';
      progress = Math.min(Math.abs(dy) / SWIPE_THRESHOLD_Y, 1);
    }
    clearBadges(el);
    const meta = ACTION_META[dir];
    el.querySelector(meta.badgeClass).style.opacity = progress;
    el.querySelector('.card-tint').style.background = meta.overlay + (progress * 0.35) + ')';
  }

  cardStack.addEventListener('pointerdown', (e) => {
    if(isAnimating || !state.queue.length) return;
    const el = e.target.closest('.stack-card');
    if(!el || !el.classList.contains('is-top')) return;
    dragState = { el, startX: e.clientX, startY: e.clientY, dx: 0, dy: 0, dragging: false };
    el.setPointerCapture(e.pointerId);
  });

  cardStack.addEventListener('pointermove', (e) => {
    if(!dragState) return;
    const dx = e.clientX - dragState.startX;
    const dy = e.clientY - dragState.startY;
    if(!dragState.dragging && (Math.abs(dx) > 8 || Math.abs(dy) > 8)){
      dragState.dragging = true;
    }
    if(dragState.dragging){
      dragState.dx = dx; dragState.dy = dy;
      const el = dragState.el;
      const rot = Math.max(-15, Math.min(15, dx / 12));
      el.style.transition = 'none';
      el.style.transform = 'translate(' + dx + 'px, ' + dy + 'px) rotate(' + rot + 'deg)';
      updateLiveFeedback(el, dx, dy);
    }
  });

  cardStack.addEventListener('pointerup', () => {
    if(!dragState) return;
    const { el, dragging, dx, dy } = dragState;
    dragState = null;
    if(!dragging){
      el.classList.toggle('flipped');
      return;
    }
    const action = resolveSwipeAction(dx, dy);
    if(action){
      commitAction(action);
    } else {
      el.style.transition = 'transform .18s cubic-bezier(.34,1.56,.64,1)';
      el.style.transform = SLOT_TRANSFORM[0];
      clearBadges(el);
      clearTint(el);
    }
  });

  cardStack.addEventListener('pointercancel', () => {
    if(!dragState) return;
    const el = dragState.el;
    dragState = null;
    el.style.transition = 'transform .18s cubic-bezier(.34,1.56,.64,1)';
    el.style.transform = SLOT_TRANSFORM[0];
    clearBadges(el);
    clearTint(el);
  });

  // ---------------- Keyboard navigation ----------------
  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if(tag === 'INPUT' || tag === 'TEXTAREA') return;
    if(!document.getElementById('panel-flashcard').classList.contains('active')) return;
    if(e.key === 'ArrowLeft')  commitAction('forgot');
    if(e.key === 'ArrowRight') commitAction('remembered');
    if(e.key === 'ArrowUp'){ e.preventDefault(); commitAction('favorite'); }
    if(e.key === 'ArrowDown'){ e.preventDefault(); commitAction('skip'); }
    if(e.key === ' ' || e.key === 'Spacebar'){
      e.preventDefault();
      if(currentWord()) elAt(0).classList.toggle('flipped');
    }
  });

  // ---------------- Speech (uses lang_code from vocabulary data) ----------------
  function speak(text){
    if(!('speechSynthesis' in window) || !text) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = state.lang_code;
    utter.rate = 0.9;
    window.speechSynthesis.speak(utter);
  }
  document.getElementById('speakWordBtn').addEventListener('click', () => {
    const w = currentWord(); if(w) speak(w.word);
  });
  document.getElementById('speakSentenceBtn').addEventListener('click', () => {
    const w = currentWord(); if(w) speak(w.example);
  });

  // ---------------- Quiz mode ----------------
  const quizStage = document.getElementById('quizStage');

  function startQuiz(){
    const ord = shuffle([...state.words.keys()]);
    state.quiz = { order: ord, current:0, score:0, mistakes:[], answered:false };
    renderQuizQuestion();
  }

  function shuffle(arr){
    const a = [...arr];
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function renderQuizQuestion(){
    const q = state.quiz;
    if(q.current >= q.order.length){ renderQuizSummary(); return; }
    const wordIdx = q.order[q.current];
    const word    = state.words[wordIdx];

    const distractors = shuffle(state.words.filter((_, i) => i !== wordIdx)).slice(0, 3).map(w => w.translation);
    const options = shuffle([word.translation, ...distractors]);

    quizStage.innerHTML =
      '<div class="quiz-progress-track">' +
        '<div class="quiz-progress-fill" style="width:' + (q.current / q.order.length * 100) + '%"></div>' +
      '</div>' +
      '<div class="question-card">' +
        '<div class="question-eyebrow">ข้อ ' + (q.current + 1) + ' / ' + q.order.length + ' · คะแนน ' + q.score + '</div>' +
        '<div class="question-word">' + word.word + '</div>' +
        '<div class="question-phonetic">' + (word.phonetic ? '/' + word.phonetic.replace(/\//g,'') + '/' : '') + '</div>' +
      '</div>' +
      '<div class="options-grid" id="optionsGrid"></div>';

    const grid = document.getElementById('optionsGrid');
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => selectAnswer(btn, opt, word));
      grid.appendChild(btn);
    });
  }

  function selectAnswer(btn, chosen, word){
    if(state.quiz.answered) return;
    state.quiz.answered = true;
    const correct = chosen === word.translation;
    document.querySelectorAll('#optionsGrid .option-btn').forEach(b => {
      b.disabled = true;
      if(b.textContent === word.translation) b.classList.add('correct');
      else if(b === btn && !correct) b.classList.add('incorrect');
    });
    if(correct){ state.quiz.score++; state.xp += 5; }
    else { state.quiz.mistakes.push({ word: word.word, correct: word.translation, chosen }); }
    updateStats();
    setTimeout(() => {
      state.quiz.current++;
      state.quiz.answered = false;
      renderQuizQuestion();
    }, 900);
  }

  function renderQuizSummary(){
    const q   = state.quiz;
    const pct = Math.round((q.score / q.order.length) * 100);
    let mistakesHtml = '';
    if(q.mistakes.length){
      mistakesHtml = '<div class="mistake-list">' + q.mistakes.map(m =>
        '<div class="mistake-item"><b>' + m.word + '</b> — เฉลย: ' + m.correct + ' (คุณตอบ: ' + m.chosen + ')</div>'
      ).join('') + '</div>';
    }
    quizStage.innerHTML =
      '<div class="summary-card">' +
        '<div class="question-eyebrow">สรุปผลการทดสอบ</div>' +
        '<div class="score-big">' + pct + '%</div>' +
        '<p style="color:var(--text-secondary); font-weight:600; margin-top:8px;">ตอบถูก ' + q.score + ' จาก ' + q.order.length + ' ข้อ</p>' +
        mistakesHtml +
        '<button class="btn btn-primary" style="margin-top:24px;" id="retryQuizBtn">ทำแบบทดสอบใหม่</button>' +
      '</div>';
    state.quiz = null;
    document.getElementById('retryQuizBtn').addEventListener('click', startQuiz);
  }

  // ---------------- Init ----------------
  renderSessionHeader();
  renderFlashcard();

})();
</script>
</body>
</html>
