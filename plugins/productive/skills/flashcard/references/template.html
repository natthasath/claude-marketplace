<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexiCard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F8FAFC; --surface:#FFFFFF; --primary:#6366F1; --primary-hover:#4F46E5;
    --secondary:#8B5CF6; --success:#22C55E; --warning:#F59E0B; --error:#EF4444;
    --text-primary:#0F172A; --text-secondary:#64748B; --border:#E2E8F0;
    --radius-card:32px; --radius-button:999px; --radius-input:16px;
    --shadow-card:0 20px 50px rgba(15,23,42,0.08);
    --shadow-hover:0 25px 60px rgba(15,23,42,0.12);
    --sp-xs:4px; --sp-sm:8px; --sp-md:16px; --sp-lg:24px; --sp-xl:40px; --sp-xxl:64px;
  }
  [data-theme="dark"]{
    --bg:#020617; --surface:#0F172A; --primary:#818CF8; --primary-hover:#A5B4FC;
    --secondary:#A78BFA; --text-primary:#F8FAFC; --text-secondary:#94A3B8; --border:#1E293B;
    --shadow-card:0 20px 50px rgba(0,0,0,0.35);
    --shadow-hover:0 25px 60px rgba(0,0,0,0.45);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Inter','Noto Sans Thai',sans-serif;
    background:var(--bg); color:var(--text-primary);
    min-height:100vh; transition:background .3s ease, color .3s ease;
    -webkit-font-smoothing:antialiased;
  }
  button, input{font-family:inherit;}
  .app{display:flex; min-height:100vh;}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:240px; flex-shrink:0; padding:var(--sp-lg); display:flex; flex-direction:column;
    gap:var(--sp-xl); border-right:1px solid var(--border);
  }
  .brand{display:flex; align-items:center; gap:var(--sp-sm); font-weight:800; font-size:22px;}
  .brand-mark{
    width:36px; height:36px; border-radius:12px;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  .nav{display:flex; flex-direction:column; gap:var(--sp-xs);}
  .nav-item{
    display:flex; align-items:center; gap:var(--sp-sm); padding:12px 16px; border-radius:16px;
    color:var(--text-secondary); cursor:pointer; font-weight:600; font-size:14px; border:none;
    background:transparent; text-align:left; transition:background .2s ease, color .2s ease;
  }
  .nav-item:hover{background:var(--border); color:var(--text-primary);}
  .nav-item.active{background:var(--primary); color:#fff;}
  .sidebar-footer{margin-top:auto; display:flex; flex-direction:column; gap:var(--sp-sm);}
  .theme-toggle{
    display:flex; align-items:center; justify-content:space-between; padding:12px 16px;
    border-radius:16px; background:var(--bg); border:1px solid var(--border); cursor:pointer;
    font-size:13px; font-weight:600; color:var(--text-secondary);
  }
  .keyboard-hint{
    font-size:11px; color:var(--text-secondary); text-align:center; padding:8px;
    line-height:1.6;
  }
  kbd{
    background:var(--border); border-radius:4px; padding:2px 5px;
    font-family:monospace; font-size:11px;
  }

  /* ---------- Main ---------- */
  .main{flex:1; padding:var(--sp-xl) var(--sp-xl) 100px; max-width:1200px; margin:0 auto; width:100%;}
  .view{display:none; animation:fadeUp .3s ease;}
  .view.active{display:block;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- Session header ---------- */
  .session-header{
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:var(--sp-md);
    margin-bottom:var(--sp-xl);
  }
  .session-title{display:flex; flex-direction:column; gap:4px;}
  .session-title h2{font-size:26px; font-weight:800;}
  .session-title span{color:var(--text-secondary); font-size:14px; font-weight:600;}
  .session-stats{display:flex; align-items:center; gap:var(--sp-lg);}
  .bloom-ring-wrap{position:relative; width:64px; height:64px;}
  .bloom-ring-wrap svg{transform:rotate(-90deg);}
  .bloom-center{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:18px; transition:transform .4s ease;
  }
  .stat-chip{
    display:flex; flex-direction:column; align-items:center; padding:8px 16px; border-radius:16px;
    background:var(--surface); border:1px solid var(--border); min-width:64px;
  }
  .stat-chip b{font-size:16px;}
  .stat-chip span{font-size:11px; color:var(--text-secondary); font-weight:700; text-transform:uppercase; letter-spacing:.03em;}

  .mode-tabs{display:flex; gap:var(--sp-xs); background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-button); padding:4px; width:fit-content; margin-bottom:var(--sp-xl);}
  .mode-tab{padding:10px 22px; border-radius:var(--radius-button); border:none; background:transparent; color:var(--text-secondary); font-weight:700; font-size:14px; cursor:pointer; transition:all .2s ease;}
  .mode-tab.active{background:var(--primary); color:#fff;}

  .mode-panel{display:none;}
  .mode-panel.active{display:block;}

  /* ---------- Flashcard ---------- */
  .flashcard-stage{display:flex; flex-direction:column; align-items:center; gap:var(--sp-lg);}
  .flip-card{
    width:100%; max-width:420px; height:480px; perspective:1400px; cursor:pointer;
  }
  .flip-card-inner{
    position:relative; width:100%; height:100%; text-align:center;
    transition:transform .6s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d;
  }
  .flip-card.flipped .flip-card-inner{transform:rotateY(180deg);}
  .card-face{
    position:absolute; inset:0; border-radius:var(--radius-card); backface-visibility:hidden;
    background:var(--surface); box-shadow:var(--shadow-card); border:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:var(--sp-xl); gap:var(--sp-sm);
  }
  .card-face.back{transform:rotateY(180deg); justify-content:flex-start; padding-top:var(--sp-xl); gap:var(--sp-md);}
  .card-tag{
    font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.08em;
    color:var(--secondary); background:rgba(139,92,246,0.12); padding:6px 14px; border-radius:var(--radius-button);
  }
  .card-word{font-size:38px; font-weight:800; letter-spacing:-.02em;}
  .card-phonetic{color:var(--text-secondary); font-size:15px; font-style:italic;}
  .card-translation{font-size:22px; font-weight:700; color:var(--primary); margin-top:var(--sp-sm);}
  .card-hint{position:absolute; bottom:20px; font-size:12px; color:var(--text-secondary); font-weight:600;}
  .card-face.back .section-label{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--text-secondary); align-self:flex-start;}
  .card-face.back .section-text{align-self:flex-start; font-size:15px; line-height:1.6;}
  .synonym-row{display:flex; gap:8px; flex-wrap:wrap; align-self:flex-start;}
  .synonym-chip{background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-button); padding:6px 12px; font-size:13px; font-weight:600;}

  .audio-controls{display:flex; gap:var(--sp-sm);}
  .icon-btn{
    width:52px; height:52px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface);
    color:var(--primary); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .2s ease;
  }
  .icon-btn:hover{background:var(--primary); color:#fff; border-color:var(--primary); transform:translateY(-2px);}

  .card-nav{display:flex; align-items:center; justify-content:center; gap:var(--sp-md); width:100%; max-width:420px;}
  .rate-row{display:flex; gap:var(--sp-sm); width:100%; max-width:420px;}
  .rate-btn{flex:1; padding:14px; border-radius:var(--radius-input); border:1.5px solid var(--border); background:var(--surface); font-weight:700; font-size:13px; cursor:pointer; transition:all .2s ease; color:var(--text-primary);}
  .rate-btn.easy:hover{background:var(--success); border-color:var(--success); color:#fff;}
  .rate-btn.medium:hover{background:var(--warning); border-color:var(--warning); color:#fff;}
  .rate-btn.hard:hover{background:var(--error); border-color:var(--error); color:#fff;}

  .btn{
    border:none; border-radius:var(--radius-button); font-weight:700; font-size:15px; cursor:pointer;
    padding:16px 24px; transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-outline{background:transparent; border:1.5px solid var(--border); color:var(--text-primary);}
  .btn-outline:hover{border-color:var(--primary); color:var(--primary); transform:translateY(-2px);}
  .btn-primary{background:var(--primary); color:#fff;}
  .btn-primary:hover{background:var(--primary-hover); transform:translateY(-2px); box-shadow:var(--shadow-hover);}

  /* ---------- Quiz ---------- */
  .quiz-stage{max-width:520px; margin:0 auto; display:flex; flex-direction:column; gap:var(--sp-lg);}
  .quiz-progress-track{height:8px; border-radius:var(--radius-button); background:var(--border); overflow:hidden;}
  .quiz-progress-fill{height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); border-radius:var(--radius-button); transition:width .3s ease;}
  .question-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card);
    padding:var(--sp-xl); box-shadow:var(--shadow-card); text-align:center;
  }
  .question-eyebrow{font-size:12px; font-weight:800; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.06em; margin-bottom:var(--sp-sm);}
  .question-word{font-size:32px; font-weight:800; margin-bottom:6px;}
  .question-phonetic{color:var(--text-secondary); font-style:italic; font-size:14px;}
  .options-grid{display:flex; flex-direction:column; gap:var(--sp-sm);}
  .option-btn{
    padding:16px 20px; border-radius:var(--radius-input); border:1.5px solid var(--border); background:var(--surface);
    text-align:left; font-size:15px; font-weight:600; cursor:pointer; transition:all .15s ease; color:var(--text-primary);
  }
  .option-btn:hover:not([disabled]){border-color:var(--primary); transform:translateX(4px);}
  .option-btn.correct{background:rgba(34,197,94,0.12); border-color:var(--success); color:var(--success);}
  .option-btn.incorrect{background:rgba(239,68,68,0.12); border-color:var(--error); color:var(--error);}
  .option-btn[disabled]{cursor:default;}

  .summary-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card); padding:var(--sp-xl); box-shadow:var(--shadow-card); text-align:center;}
  .score-big{font-size:56px; font-weight:800; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .mistake-list{text-align:left; margin-top:var(--sp-lg); display:flex; flex-direction:column; gap:var(--sp-sm);}
  .mistake-item{padding:14px 16px; border-radius:var(--radius-input); background:var(--bg); border:1px solid var(--border); font-size:14px;}
  .mistake-item b{color:var(--error);}

  /* ---------- Bottom nav (mobile) ---------- */
  .bottom-nav{display:none;}

  @media (max-width:860px){
    .sidebar{display:none;}
    .main{padding:var(--sp-lg) var(--sp-md) 100px;}
    .bottom-nav{
      display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--surface);
      border-top:1px solid var(--border); padding:8px 12px calc(8px + env(safe-area-inset-bottom));
      justify-content:space-around; z-index:20;
    }
    .bottom-nav button{
      display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none;
      color:var(--text-secondary); font-size:11px; font-weight:700; padding:8px 14px; border-radius:16px;
      min-width:48px; min-height:48px; cursor:pointer;
    }
    .bottom-nav button.active{color:var(--primary);}
    .flip-card{height:420px;}
    .card-word{font-size:30px;}
  }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">🌱</div>LexiCard</div>
    <nav class="nav">
      <button class="nav-item active" data-nav="flashcard">🗂️&nbsp; Flashcards</button>
      <button class="nav-item" data-nav="quiz">🎯&nbsp; ทดสอบ</button>
    </nav>
    <div class="sidebar-footer">
      <div class="keyboard-hint">
        <kbd>←</kbd> <kbd>→</kbd> เลื่อนการ์ด<br>
        <kbd>Space</kbd> พลิกการ์ด
      </div>
      <button class="theme-toggle" id="themeToggle">
        <span id="themeLabel">โหมดมืด</span><span id="themeIcon">🌙</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <section class="view active" id="view-session">
      <div class="session-header">
        <div class="session-title">
          <h2 id="sessionCategory">หมวดหมู่</h2>
          <span id="sessionMeta">ภาษา · ระดับ · 20 คำ</span>
        </div>
        <div class="session-stats">
          <div class="stat-chip"><b id="statMastered">0</b><span>จำได้แล้ว</span></div>
          <div class="stat-chip"><b id="statXP">0</b><span>XP</span></div>
          <div class="bloom-ring-wrap">
            <svg width="64" height="64" viewBox="0 0 64 64">
              <circle cx="32" cy="32" r="27" fill="none" stroke="var(--border)" stroke-width="6"/>
              <circle id="bloomRing" cx="32" cy="32" r="27" fill="none" stroke="url(#bloomGradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="169.6" stroke-dashoffset="169.6"/>
              <defs>
                <linearGradient id="bloomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="var(--primary)"/>
                  <stop offset="100%" stop-color="var(--secondary)"/>
                </linearGradient>
              </defs>
            </svg>
            <div class="bloom-center" id="bloomCenter">🌱</div>
          </div>
        </div>
      </div>

      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="flashcard">🗂️ Flashcards</button>
        <button class="mode-tab" data-mode="quiz">🎯 ทดสอบ</button>
      </div>

      <!-- Flashcard mode -->
      <div class="mode-panel active" id="panel-flashcard">
        <div class="flashcard-stage">
          <div class="flip-card" id="flipCard">
            <div class="flip-card-inner">
              <div class="card-face front">
                <div class="card-tag" id="cardPos">noun</div>
                <div class="card-word" id="cardWord">word</div>
                <div class="card-phonetic" id="cardPhonetic">/wɜːd/</div>
                <div class="card-translation" id="cardTranslation">คำแปล</div>
                <div class="card-hint">แตะการ์ดหรือกด Space เพื่อดูรายละเอียด</div>
              </div>
              <div class="card-face back">
                <div class="section-label">ตัวอย่างประโยค</div>
                <div class="section-text" id="cardExample">Example sentence.</div>
                <div class="section-label">คำใกล้เคียง</div>
                <div class="synonym-row" id="cardSynonyms"></div>
              </div>
            </div>
          </div>

          <div class="audio-controls">
            <button class="icon-btn" id="speakWordBtn" title="ออกเสียงคำศัพท์">🔊</button>
            <button class="icon-btn" id="speakSentenceBtn" title="อ่านตัวอย่างประโยค">📖</button>
          </div>

          <div class="rate-row">
            <button class="rate-btn hard" data-rate="hard">ยังไม่คุ้น</button>
            <button class="rate-btn medium" data-rate="medium">คุ้นๆ</button>
            <button class="rate-btn easy" data-rate="easy">จำได้แล้ว</button>
          </div>

          <div class="card-nav">
            <button class="btn btn-outline" id="prevBtn">← ก่อนหน้า</button>
            <span id="cardProgress" style="font-weight:700; color:var(--text-secondary); font-size:14px;">1 / 20</span>
            <button class="btn btn-outline" id="nextBtn">ถัดไป →</button>
          </div>
        </div>
      </div>

      <!-- Quiz mode -->
      <div class="mode-panel" id="panel-quiz">
        <div class="quiz-stage" id="quizStage"></div>
      </div>
    </section>
  </main>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav">
    <button class="active" data-nav="flashcard">🗂️<span>Flashcards</span></button>
    <button data-nav="quiz">🎯<span>ทดสอบ</span></button>
  </nav>

</div>

<script>
(function(){
  // Vocabulary data injected by the flashcard skill
  // Replace __VOCAB_DATA__ with the generated JSON object
  const VOCAB_DATA = __VOCAB_DATA__;

  // ---------------- State ----------------
  const state = {
    category: VOCAB_DATA.category,
    language: VOCAB_DATA.language,
    difficulty: VOCAB_DATA.difficulty,
    lang_code: VOCAB_DATA.lang_code || 'en-US',
    words: VOCAB_DATA.words,
    index: 0,
    mastered: new Set(),
    xp: 0,
    quiz: null
  };

  // ---------------- Theme ----------------
  const themeToggle = document.getElementById('themeToggle');
  const themeLabel  = document.getElementById('themeLabel');
  const themeIcon   = document.getElementById('themeIcon');
  themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if(isDark){
      document.documentElement.removeAttribute('data-theme');
      themeLabel.textContent = 'โหมดมืด'; themeIcon.textContent = '🌙';
    } else {
      document.documentElement.setAttribute('data-theme','dark');
      themeLabel.textContent = 'โหมดสว่าง'; themeIcon.textContent = '☀️';
    }
  });

  // ---------------- Mode tabs / nav ----------------
  function switchMode(mode){
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
    document.getElementById('panel-flashcard').classList.toggle('active', mode === 'flashcard');
    document.getElementById('panel-quiz').classList.toggle('active', mode === 'quiz');
    document.querySelectorAll('[data-nav]').forEach(b => b.classList.toggle('active', b.dataset.nav === mode));
    if(mode === 'quiz' && !state.quiz) startQuiz();
  }
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => switchMode(tab.dataset.mode));
  });
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => switchMode(btn.dataset.nav));
  });

  // ---------------- Session header / bloom ring ----------------
  const bloomRing   = document.getElementById('bloomRing');
  const bloomCenter = document.getElementById('bloomCenter');
  const CIRCUMFERENCE = 169.6;
  const DIFFICULTY_LABEL = { beginner:'ง่าย', intermediate:'กลาง', advanced:'ยาก' };

  function renderSessionHeader(){
    document.title = `LexiCard — ${state.category}`;
    document.getElementById('sessionCategory').textContent = state.category;
    const diffLabel = DIFFICULTY_LABEL[state.difficulty] || state.difficulty;
    document.getElementById('sessionMeta').textContent = `ภาษา${state.language} · ระดับ${diffLabel} · ${state.words.length} คำ`;
    updateStats();
  }
  function updateStats(){
    document.getElementById('statMastered').textContent = state.mastered.size;
    document.getElementById('statXP').textContent = state.xp;
    const pct = state.words.length ? state.mastered.size / state.words.length : 0;
    bloomRing.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
    const scale = 0.7 + pct * 0.6;
    bloomCenter.style.transform = `scale(${scale.toFixed(2)})`;
    bloomCenter.textContent = pct >= 1 ? '🌸' : pct >= 0.5 ? '🌿' : '🌱';
  }

  // ---------------- Flashcard mode ----------------
  const flipCard = document.getElementById('flipCard');
  flipCard.addEventListener('click', () => flipCard.classList.toggle('flipped'));

  function renderFlashcard(){
    const w = state.words[state.index];
    flipCard.classList.remove('flipped');
    document.getElementById('cardPos').textContent = w.pos || '—';
    document.getElementById('cardWord').textContent = w.word;
    document.getElementById('cardPhonetic').textContent = w.phonetic ? `/${w.phonetic.replace(/\//g,'')}/` : '';
    document.getElementById('cardTranslation').textContent = w.translation;
    document.getElementById('cardExample').textContent = w.example || '—';
    const synWrap = document.getElementById('cardSynonyms');
    synWrap.innerHTML = '';
    (w.synonyms || []).forEach(s => {
      const chip = document.createElement('span');
      chip.className = 'synonym-chip'; chip.textContent = s;
      synWrap.appendChild(chip);
    });
    document.getElementById('cardProgress').textContent = `${state.index + 1} / ${state.words.length}`;
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    state.index = (state.index - 1 + state.words.length) % state.words.length;
    renderFlashcard();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    state.index = (state.index + 1) % state.words.length;
    renderFlashcard();
  });

  document.querySelectorAll('.rate-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const level = btn.dataset.rate;
      const w = state.words[state.index];
      if(level === 'easy'){ state.mastered.add(w.word); state.xp += 10; }
      else if(level === 'medium'){ state.xp += 5; }
      else { state.mastered.delete(w.word); state.xp += 2; }
      updateStats();
      state.index = (state.index + 1) % state.words.length;
      renderFlashcard();
    });
  });

  // ---------------- Keyboard navigation ----------------
  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if(tag === 'INPUT' || tag === 'TEXTAREA') return;
    if(e.key === 'ArrowLeft')  document.getElementById('prevBtn').click();
    if(e.key === 'ArrowRight') document.getElementById('nextBtn').click();
    if(e.key === ' ' || e.key === 'Spacebar'){
      e.preventDefault();
      flipCard.click();
    }
  });

  // ---------------- Speech (uses lang_code from vocabulary data) ----------------
  function speak(text){
    if(!('speechSynthesis' in window) || !text) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = state.lang_code;
    utter.rate = 0.9;
    window.speechSynthesis.speak(utter);
  }
  document.getElementById('speakWordBtn').addEventListener('click', () => {
    speak(state.words[state.index].word);
  });
  document.getElementById('speakSentenceBtn').addEventListener('click', () => {
    speak(state.words[state.index].example);
  });

  // ---------------- Quiz mode ----------------
  const quizStage = document.getElementById('quizStage');

  function startQuiz(){
    const order = shuffle([...state.words.keys()]);
    state.quiz = { order, current:0, score:0, mistakes:[], answered:false };
    renderQuizQuestion();
  }

  function shuffle(arr){
    const a = [...arr];
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function renderQuizQuestion(){
    const q = state.quiz;
    if(q.current >= q.order.length){ renderQuizSummary(); return; }
    const wordIdx = q.order[q.current];
    const word    = state.words[wordIdx];

    const distractors = shuffle(state.words.filter((_, i) => i !== wordIdx)).slice(0, 3).map(w => w.translation);
    const options = shuffle([word.translation, ...distractors]);

    quizStage.innerHTML = `
      <div class="quiz-progress-track">
        <div class="quiz-progress-fill" style="width:${(q.current / q.order.length) * 100}%"></div>
      </div>
      <div class="question-card">
        <div class="question-eyebrow">ข้อ ${q.current + 1} / ${q.order.length} · คะแนน ${q.score}</div>
        <div class="question-word">${word.word}</div>
        <div class="question-phonetic">${word.phonetic ? '/' + word.phonetic.replace(/\//g,'') + '/' : ''}</div>
      </div>
      <div class="options-grid" id="optionsGrid"></div>
    `;
    const grid = document.getElementById('optionsGrid');
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => selectAnswer(btn, opt, word));
      grid.appendChild(btn);
    });
  }

  function selectAnswer(btn, chosen, word){
    if(state.quiz.answered) return;
    state.quiz.answered = true;
    const correct = chosen === word.translation;
    document.querySelectorAll('#optionsGrid .option-btn').forEach(b => {
      b.disabled = true;
      if(b.textContent === word.translation) b.classList.add('correct');
      else if(b === btn && !correct) b.classList.add('incorrect');
    });
    if(correct){ state.quiz.score++; state.xp += 5; }
    else { state.quiz.mistakes.push({ word: word.word, correct: word.translation, chosen }); }
    updateStats();
    setTimeout(() => {
      state.quiz.current++;
      state.quiz.answered = false;
      renderQuizQuestion();
    }, 900);
  }

  function renderQuizSummary(){
    const q   = state.quiz;
    const pct = Math.round((q.score / q.order.length) * 100);
    let mistakesHtml = '';
    if(q.mistakes.length){
      mistakesHtml = `<div class="mistake-list">` + q.mistakes.map(m =>
        `<div class="mistake-item"><b>${m.word}</b> — เฉลย: ${m.correct} (คุณตอบ: ${m.chosen})</div>`
      ).join('') + `</div>`;
    }
    quizStage.innerHTML = `
      <div class="summary-card">
        <div class="question-eyebrow">สรุปผลการทดสอบ</div>
        <div class="score-big">${pct}%</div>
        <p style="color:var(--text-secondary); font-weight:600; margin-top:8px;">ตอบถูก ${q.score} จาก ${q.order.length} ข้อ</p>
        ${mistakesHtml}
        <button class="btn btn-primary" style="margin-top:24px;" id="retryQuizBtn">ทำแบบทดสอบใหม่</button>
      </div>
    `;
    state.quiz = null;
    document.getElementById('retryQuizBtn').addEventListener('click', startQuiz);
  }

  // ---------------- Init ----------------
  renderSessionHeader();
  renderFlashcard();

})();
</script>
</body>
</html>
